<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Gelibolu Yazıcızade Mahya v13</title>
    <style>
        :root { --bg: #020205; --panel: #fdf5e6; --gold: #d4af37; --red: #bf360c; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: 'Georgia', serif; }
        .ramadan-bg { position: absolute; width: 100%; height: 100%; background: radial-gradient(circle at 50% 30%, #1a1a2e 0%, #020205 100%); z-index: -1; }
        .main-layout { display: flex; width: 100%; height: 100vh; align-items: center; justify-content: space-between; padding: 0 40px; box-sizing: border-box; }
        
        /* Yan Paneller */
        .side-panel { width: 220px; height: 85vh; background: rgba(20, 20, 35, 0.95); border: 2px solid var(--gold); border-radius: 20px; display: flex; flex-direction: column; justify-content: space-around; align-items: center; box-shadow: 0 0 40px #000; }
        .side-text { color: #fdf5e6; font-size: 2rem; font-weight: bold; text-align: center; text-shadow: 2px 2px 5px #000; letter-spacing: 2px; }
        
        /* Ana Pano */
        .mahya-frame { background: var(--panel); border: 12px double #8b6508; border-radius: 50px; padding: 35px; width: 55%; text-align: center; box-shadow: 0 0 80px rgba(255, 215, 0, 0.3); position: relative; }
        .logo { max-width: 250px; margin-bottom: 10px; }
        .owner-name { font-size: 3.2rem; font-weight: 900; color: #1a1a1a; text-transform: uppercase; margin: 5px 0; line-height: 1.1; }
        .blessing { font-size: 2.2rem; color: #1b5e20; font-weight: bold; margin: 15px 0; font-style: italic; }
        
        /* Sayaç */
        #countdown { font-size: 11rem; font-weight: 900; font-family: 'Courier New', monospace; color: var(--red); text-shadow: 3px 3px 0px #fff; margin: 10px 0; line-height: 0.9; }
        .status-msg { font-size: 6rem; font-weight: 900; color: #d32f2f; display: none; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        #debug-bar { position: absolute; bottom: 10px; width: 100%; left: 0; font-size: 0.7rem; color: #8b6508; opacity: 0.5; font-style: italic; }
    </style>
</head>
<body onclick="initAudio()">

    <div class="ramadan-bg"></div>
    
    <audio id="cannon-sound"><source src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptoken=6691458e-0925-4680-8777-62846988888b" type="audio/mpeg"></audio>

    <div class="main-layout">
        <div class="side-panel">
            <div class="side-text">SAHUR</div>
            <div class="side-text">İFTAR</div>
            <div class="side-text">FİTRE</div>
        </div>

        <div class="mahya-frame">
            <img src="logo.png" class="logo" onerror="this.style.display='none'">
            <div id="full-date" style="font-weight:bold; color:#7a5901; font-size: 1.5rem;">BAĞLANILIYOR...</div>
            
            <div id="owner-area">
                <div style="margin-top:15px; font-weight:bold; color:#5d4037;">Bugünün İftar Sahibi:</div>
                <div id="owner1" class="owner-name">...</div>
                <div id="owner2" class="owner-name"></div>
            </div>

            <div class="blessing">Allah Razı Olsun</div>

            <div id="timer-section">
                <div style="font-weight:bold; color:#5d4037; font-size: 1.8rem; letter-spacing: 2px;">VAKTE KALAN</div>
                <div id="countdown">00:00:00</div>
            </div>
            
            <div id="vakit-geldi" class="status-msg">İFTAR VAKTİ!</div>
            <div id="debug-bar">Veriler senkronize ediliyor...</div>
        </div>

        <div class="side-panel">
            <div class="side-text">FİDYE</div>
            <div class="side-text">ZEKAT</div>
            <div class="side-text">KURBAN</div>
        </div>
    </div>

    <script>
        // Sizin en son API Linkiniz
        const scriptURL = "https://script.google.com/macros/s/AKfycbYp_9fTXDCh0VvVjZufsWdr-ncvcQElkzr9m1SHMAas_EqJsSlnpi7xpst5H2TkF9JoQ/exec";

        function fetchData() {
            const script = document.createElement('script');
            // JSONP çağrısı: Güvenlik engelini aşan en sağlam yöntem
            script.src = scriptURL + "?callback=handleResponse&t=" + Date.now();
            document.body.appendChild(script);
        }

        function handleResponse(data) {
            if (data.found) {
                document.getElementById('owner1').innerText = data.sahibi1 || "";
                document.getElementById('owner2').innerText = data.sahibi2 || "";
                document.getElementById('full-date').innerText = new Date().toLocaleDateString('tr-TR', {year:'numeric', month:'long', day:'numeric', weekday:'long'}) + " | 17 RAMAZAN";
                document.getElementById('debug-bar').innerText = "Veri Alındı: " + data.tarih;
                startClock(data.iftar, data.teravih);
            } else {
                document.getElementById('owner1').innerText = "TABLODA KAYIT YOK";
                document.getElementById('debug-bar').innerText = "Aranan Tarih: " + data.aranan;
            }
        }

        let hasShot = false;
        function startClock(iftar, teravih) {
            if (window.mainTimer) clearInterval(window.mainTimer);
            window.mainTimer = setInterval(() => {
                const simdi = new Date();
                const nowSec = (simdi.getHours() * 3600) + (simdi.getMinutes() * 60) + simdi.getSeconds();
                
                const [iH, iM] = iftar.split(':').map(Number);
                const iftarSec = (iH * 3600) + (iM * 60);

                // Ramazan Topu Tetikleyici
                if (nowSec === iftarSec && !hasShot) {
                    const sound = document.getElementById('cannon-sound');
                    sound.play().catch(() => console.log("Lütfen ekrana bir kez tıklayın"));
                    hasShot = true;
                    setTimeout(() => { hasShot = false; }, 60000);
                }

                let target;
                if (nowSec < iftarSec) {
                    target = iftar;
                    document.getElementById('vakit-geldi').style.display = "none";
                    document.getElementById('timer-section').style.display = "block";
                } else if (nowSec < iftarSec + 900) { // İftar vakti 15 dakika boyunca yazı kalır
                    document.getElementById('timer-section').style.display = "none";
                    document.getElementById('vakit-geldi').style.display = "block";
                    return;
                } else {
                    target = teravih;
                    document.getElementById('vakit-geldi').style.display = "none";
                    document.getElementById('timer-section').style.display = "block";
                }

                const [h, m] = target.split(':');
                const tDate = new Date(); tDate.setHours(h, m, 0);
                let diff = tDate - simdi;

                const hh = Math.floor(diff / 3600000);
                const mm = Math.floor((diff % 3600000) / 60000);
                const ss = Math.floor((diff % 60000) / 1000);

                document.getElementById('countdown').innerText = 
                    `${String(Math.max(0,hh)).padStart(2,'0')}:${String(Math.max(0,mm)).padStart(2,'0')}:${String(Math.max(0,ss)).padStart(2,'0')}`;
            }, 1000);
        }

        // Ses sistemi için kullanıcı etkileşimi şarttır
        function initAudio() { 
            document.getElementById('cannon-sound').load();
            document.getElementById('debug-bar').innerText = "Sistem ve Ses Aktif.";
        }

        // İlk veri çekme işlemi
        fetchData();
        // 10 dakikada bir veri güncelleme
        setInterval(fetchData, 600000);
    </script>
</body>
</html>
