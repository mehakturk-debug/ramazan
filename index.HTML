<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelibolu Mahya Pro - Yazıcızade Yurdu</title>
    <style>
        :root {
            --bg-dark: #05050a; 
            --panel-bg: #fdf5e6; 
            --side-panel-bg: rgba(20, 20, 35, 0.9);
            --gold: #d4af37;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: var(--bg-dark);
            font-family: 'Georgia', serif; display: flex; color: #3d2b1f;
        }

        .ramadan-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, #1a1a2e 0%, #05050a 100%);
            z-index: -1;
        }

        .main-layout {
            display: flex; width: 100%; height: 100vh;
            align-items: center; justify-content: space-between;
            padding: 0 50px; box-sizing: border-box;
        }

        /* Yan Paneller - Resimsiz Sade Metin */
        .side-panel {
            width: 200px; height: 85vh;
            background-color: var(--side-panel-bg);
            border: 2px solid var(--gold);
            border-radius: 20px;
            display: flex; flex-direction: column;
            justify-content: space-around; align-items: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .side-item { 
            text-align: center; width: 100%; 
            padding: 10px;
        }

        .side-text {
            color: #fdf5e6; 
            font-size: 1.8rem; /* Yazı boyutu büyütüldü */
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 2px; 
            text-shadow: 2px 2px 4px #000;
            line-height: 1.3;
        }

        /* Orta Ana Pano */
        .mahya-frame {
            background-color: var(--panel-bg);
            border: 10px double #8b6508; border-radius: 40px;
            padding: 40px; box-shadow: 0 0 80px rgba(255, 215, 0, 0.4);
            width: 50%; max-width: 850px; text-align: center;
            position: relative;
        }

        .logo { max-width: 320px; margin: 0 auto 20px auto; display: block; }

        .date-box {
            font-size: 1.6rem; color: #7a5901; font-weight: bold;
            margin-bottom: 20px; border-bottom: 2px solid rgba(139, 101, 8, 0.2);
            display: inline-block; padding: 5px 20px;
        }

        .owners-container { margin: 15px 0; }
        .owner-title { font-size: 1.6rem; color: #5d4037; font-weight: bold; margin-bottom: 10px; }
        .owner-name {
            font-size: 3.2rem; font-weight: 900; color: #2c1e14;
            text-transform: uppercase; line-height: 1.2;
        }

        .blessing {
            font-size: 2.4rem; color: #1b5e20;
            margin: 20px 0; font-weight: bold;
        }

        #countdown {
            font-size: 10rem; font-weight: 900;
            font-family: 'Courier New', monospace; color: #bf360c;
            text-shadow: 2px 2px 0px #fff, 4px 4px 15px rgba(0,0,0,0.2);
            margin: 10px 0;
        }

        .status-msg {
            font-size: 6rem; font-weight: 900; color: #d32f2f;
            display: none; animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .quote-container {
            margin-top: 30px; padding: 20px;
            background: rgba(255, 255, 255, 0.4); border-radius: 20px;
        }

        .quote-text { font-size: 1.7rem; color: #2c1e14; line-height: 1.4; font-weight: 500;}
    </style>
</head>
<body>

<div class="ramadan-bg"></div>

<audio id="cannon-sound" preload="auto">
    <source src="https://www.soundboard.com/handler/DownLoadTrack.ashx?cliptoken=6691458e-0925-4680-8777-62846988888b" type="audio/mpeg">
</audio>

<div class="main-layout">
    <div class="side-panel">
        <div class="side-item">
            <div class="side-text">SAHUR</div>
        </div>
        <div class="side-item">
            <div class="side-text">İFTAR</div>
        </div>
        <div class="side-item">
            <div class="side-text">FİTRE</div>
        </div>
    </div>

    <div class="mahya-frame">
        <img src="logo.png" alt="Yazıcızade Yurdu" class="logo">
        <div id="full-date" class="date-box">...</div>

        <div class="owners-container">
            <div class="owner-title">İftar Sahibi:</div>
            <div class="owner-name">SEDAT ALTINBAŞ</div>
            <div class="owner-name">SERKAN ALTINBAŞ</div>
        </div>
        
        <div class="blessing">Allah Razı Olsun</div>

        <div id="timer-section">
            <div id="countdown">00:00:00</div>
        </div>

        <div id="vakit-geldi" class="status-msg">İFTAR VAKTİ!</div>

        <div class="quote-container">
            <div id="quote-display" class="quote-text">...</div>
        </div>
    </div>

    <div class="side-panel">
        <div class="side-item">
            <div class="side-text">FİDYE</div>
        </div>
        <div class="side-item">
            <div class="side-text">ZEKAT</div>
        </div>
        <div class="side-item">
            <div class="side-text">KURBAN</div>
        </div>
    </div>
</div>

<script>
    const iftarVakti = "19:18";
    const teravihVakti = "20:45";
    let hasShot = false;

    const quotes = [
        "“Oruç tutunuz ki sıhhat bulasınız.” (Hadis-i Şerif)",
        "“Oruçlu için iki sevinç vardır: İftar anı ve Rabbiyle mülaki olduğu an.” (Hadis-i Şerif)",
        "“Kim bir oruçluya iftar ettirirse, onun kadar sevap kazanır.” (Hadis-i Şerif)"
    ];

    function updateDates() {
        const simdi = new Date();
        const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
        // 6 Mart 2026 Cuma -> 17 Ramazan
        document.getElementById('full-date').innerText = simdi.toLocaleDateString('tr-TR', options) + " | 17 RAMAZAN 1447";
    }

    function startTimer() {
        setInterval(() => {
            const simdi = new Date();
            const nowSec = (simdi.getHours() * 3600) + (simdi.getMinutes() * 60) + simdi.getSeconds();
            const [iH, iM] = iftarVakti.split(':').map(Number);
            const iftarSec = (iH * 3600) + (iM * 60);

            // Top Patlatma
            if (nowSec === iftarSec && !hasShot) {
                document.getElementById('cannon-sound').play().catch(e => console.log("Ses çalmak için sayfaya tıklayın."));
                hasShot = true;
                setTimeout(() => { hasShot = false; }, 60000);
            }

            let targetTime;
            if (nowSec < iftarSec) {
                targetTime = iftarVakti;
                document.getElementById('vakit-geldi').style.display = "none";
                document.getElementById('timer-section').style.display = "block";
            } else if (nowSec >= iftarSec && nowSec < iftarSec + 900) { // 15 dk göster
                document.getElementById('timer-section').style.display = "none";
                document.getElementById('vakit-geldi').style.display = "block";
                return;
            } else {
                targetTime = teravihVakti;
                document.getElementById('vakit-geldi').style.display = "none";
                document.getElementById('timer-section').style.display = "block";
            }

            const [h, m] = targetTime.split(':');
            const target = new Date(); target.setHours(h, m, 0);
            let diff = target - simdi;
            if (diff < 0) { document.getElementById('countdown').innerText = "Vakit Girdi"; return; }

            const hours = Math.floor(diff / 3600000);
            const mins = Math.floor((diff % 3600000) / 60000);
            const secs = Math.floor((diff % 60000) / 1000);
            document.getElementById('countdown').innerText = 
                `${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }, 1000);
    }

    let qIdx = 0;
    function cycleQuotes() {
        document.getElementById('quote-display').innerText = quotes[qIdx];
        qIdx = (qIdx + 1) % quotes.length;
    }

    updateDates(); startTimer(); cycleQuotes(); setInterval(cycleQuotes, 30000);
</script>

</body>
</html>
